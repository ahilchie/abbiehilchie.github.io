<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Flag Puzzle - Abbie Hilchie</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        .game-wrap {
            max-width: 580px;
            margin: 3rem auto;
            padding: 0 1rem;
            font-family: 'Open Sans', sans-serif;
        }
        .game-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 2rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .game-title {
            font-family: 'Open Sans', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
        }
        .stats {
            display: flex;
            gap: 10px;
        }
        .stat {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: #6c757d;
        }
        .stat strong { color: #212529; }
        .mode-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background: #fff;
            color: #6c757d;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #cce7ec;
            color: #005061;
            border-color: transparent;
            font-weight: 700;
        }
        .progress-row {
            display: flex;
            gap: 4px;
            margin-bottom: 1rem;
        }
        .pip {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e9ecef;
        }
        .pip.correct { background: #198754; }
        .pip.wrong   { background: #dc3545; }
        .hint-text {
            font-size: 13px;
            color: #6c757d;
            text-align: center;
            margin-bottom: 1rem;
        }
        .drop-grid {
            display: grid;
            gap: 4px;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .drop-cell {
            border: 2px dashed #ced4da;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #adb5bd;
            transition: background 0.15s;
        }
        .drop-cell.over   { background: #cce7ec; }
        .drop-cell.filled { border-style: solid; border-color: #dee2e6; }
        .pieces-tray {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 1rem;
            min-height: 100px;
            justify-content: center;
        }
        .piece {
            cursor: grab;
            border-radius: 4px;
            border: 1px solid #dee2e6;
            transition: opacity 0.15s;
            user-select: none;
        }
        .piece:active { cursor: grabbing; opacity: 0.6; }
        .piece.used   { opacity: 0.2; pointer-events: none; }
        .answer-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .answer-input {
            flex: 1;
            padding: 10px 14px;
            font-size: 1rem;
            font-family: 'Open Sans', sans-serif;
            border: 1px solid #ced4da;
            border-radius: 6px;
        }
        .answer-input:focus {
            outline: none;
            border-color: #0085A1;
            box-shadow: 0 0 0 3px rgba(0,133,161,0.2);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .btn-row button {
            flex: 1;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 800;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 6px;
            border: 1px solid #ced4da;
            background: #fff;
            cursor: pointer;
        }
        .btn-row button:hover { background: #f8f9fa; }
        .btn-row button.primary {
            background: #0085A1;
            color: #fff;
            border-color: #0085A1;
        }
        .btn-row button.primary:hover { background: #006a81; }
        .result {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Open Sans', sans-serif;
            margin-bottom: 1rem;
        }
        .result.win  { background: #d1e7dd; color: #0f5132; }
        .result.lose { background: #f8d7da; color: #842029; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6c757d;
            font-family: 'Open Sans', sans-serif;
        }
        .back-link a { color: #0085A1; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">Abbie Hilchie</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive"
                aria-expanded="false" aria-label="Toggle navigation">
                Menu <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto py-4 py-lg-0">
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="travelplans.html">Travel Plans</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="traveltime.html">Travel Time</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Game -->
    <div class="game-wrap">
        <div class="game-card">

            <div class="top-bar">
                <h1 class="game-title">Flag Puzzle</h1>
                <div class="stats">
                    <div class="stat">Score <strong id="score">0</strong></div>
                    <div class="stat">Streak <strong id="streak">0</strong></div>
                </div>
            </div>

            <div class="mode-row">
                <button class="mode-btn active" onclick="setMode('flag')"    id="mode-flag">Guess the flag</button>
                <button class="mode-btn"        onclick="setMode('country')" id="mode-country">Guess the country</button>
            </div>

            <div class="progress-row" id="progress"></div>
            <p class="hint-text" id="hint-text">Drag pieces into the grid to reveal the flag, then guess!</p>

            <div class="drop-grid"   id="drop-grid"></div>
            <div class="pieces-tray" id="pieces-tray"></div>

            <div class="answer-row">
                <input
                    type="text"
                    id="answer-input"
                    class="answer-input"
                    placeholder="Type your answer..."
                    autocomplete="off"
                />
            </div>

            <div class="btn-row">
                <button class="primary" onclick="checkAnswer()">Submit guess</button>
                <button onclick="giveHint()">Hint</button>
                <button onclick="newRound()">New puzzle</button>
            </div>

            <div id="result-msg"></div>

        </div>

        <p class="back-link">
            <a href="travelplans.html">&larr; Back to travel page</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>

    <script>
        const FLAGS = [
            {country:"France",     continent:"Europe",        colors:["#002395","#FFFFFF","#ED2939"], stripes:"vertical",   cols:3, rows:1},
            {country:"Germany",    continent:"Europe",        colors:["#000000","#DD0000","#FFCE00"], stripes:"horizontal", cols:1, rows:3},
            {country:"Italy",      continent:"Europe",        colors:["#009246","#FFFFFF","#CE2B37"], stripes:"vertical",   cols:3, rows:1},
            {country:"Japan",      continent:"Asia",          colors:["#FFFFFF","#BC002D"],           stripes:"circle",     cols:3, rows:3},
            {country:"Brazil",     continent:"South America", colors:["#009C3B","#FEDD00","#002776"], stripes:"diamond",    cols:3, rows:3},
            {country:"Sweden",     continent:"Europe",        colors:["#006AA7","#FECC02"],           stripes:"cross",      cols:3, rows:3},
            {country:"Canada",     continent:"North America", colors:["#FF0000","#FFFFFF","#FF0000"], stripes:"vertical",   cols:3, rows:1},
            {country:"Ukraine",    continent:"Europe",        colors:["#005BBB","#FFD500"],           stripes:"horizontal", cols:1, rows:2},
            {country:"Argentina",  continent:"South America", colors:["#74ACDF","#FFFFFF","#74ACDF"], stripes:"horizontal", cols:1, rows:3},
            {country:"Netherlands",continent:"Europe",        colors:["#AE1C28","#FFFFFF","#21468B"], stripes:"horizontal", cols:1, rows:3},
            {country:"Poland",     continent:"Europe",        colors:["#FFFFFF","#DC143C"],           stripes:"horizontal", cols:1, rows:2},
            {country:"Norway",     continent:"Europe",        colors:["#EF2B2D","#FFFFFF","#002868"], stripes:"cross",      cols:3, rows:3},
        ];

        const PIECE_SIZE = 80;
        let current, mode, pieces, placed, score=0, streak=0, hintCount=0, history=[];

        function setMode(m) {
            mode = m;
            document.getElementById('mode-flag').className    = 'mode-btn' + (m==='flag'    ? ' active' : '');
            document.getElementById('mode-country').className = 'mode-btn' + (m==='country' ? ' active' : '');
            newRound();
        }

        function buildFlagCanvas(flag, w, h) {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            if (flag.stripes === 'vertical') {
                const cw = w / flag.colors.length;
                flag.colors.forEach((col, i) => { ctx.fillStyle=col; ctx.fillRect(i*cw,0,cw,h); });
            } else if (flag.stripes === 'horizontal') {
                const ch = h / flag.colors.length;
                flag.colors.forEach((col, i) => { ctx.fillStyle=col; ctx.fillRect(0,i*ch,w,ch); });
            } else if (flag.stripes === 'circle') {
                ctx.fillStyle = flag.colors[0]; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = flag.colors[1];
                ctx.beginPath(); ctx.arc(w/2,h/2,Math.min(w,h)*0.28,0,Math.PI*2); ctx.fill();
            } else if (flag.stripes === 'diamond') {
                ctx.fillStyle = flag.colors[0]; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = flag.colors[1];
                ctx.beginPath(); ctx.moveTo(w/2,h*0.15); ctx.lineTo(w*0.88,h/2); ctx.lineTo(w/2,h*0.85); ctx.lineTo(w*0.12,h/2); ctx.closePath(); ctx.fill();
                ctx.fillStyle = flag.colors[2];
                ctx.beginPath(); ctx.arc(w/2,h/2,Math.min(w,h)*0.18,0,Math.PI*2); ctx.fill();
            } else if (flag.stripes === 'cross') {
                ctx.fillStyle = flag.colors[0]; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = flag.colors[1];
                ctx.fillRect(w*0.3,0,w*0.15,h);
                ctx.fillRect(0,h*0.35,w,h*0.15);
                if (flag.colors[2]) {
                    ctx.fillStyle = flag.colors[2];
                    ctx.fillRect(w*0.33,0,w*0.09,h);
                    ctx.fillRect(0,h*0.38,w,h*0.09);
                }
            }
            return c;
        }

        function newRound() {
            current   = FLAGS[Math.floor(Math.random() * FLAGS.length)];
            hintCount = 0;
            pieces    = [];
            placed    = {};
            document.getElementById('result-msg').innerHTML       = '';
            document.getElementById('answer-input').value         = '';
            document.getElementById('answer-input').disabled      = false;
            document.getElementById('hint-text').textContent      = 'Drag pieces into the grid to reveal the flag, then guess!';
            renderProgress();
            buildPuzzle();
        }

        function renderProgress() {
            const p = document.getElementById('progress');
            p.innerHTML = '';
            history.slice(-10).forEach(r => {
                const d = document.createElement('div');
                d.className = 'pip ' + (r ? 'correct' : 'wrong');
                p.appendChild(d);
            });
        }

        function buildPuzzle() {
            const cols = current.cols, rows = current.rows;
            const pw = PIECE_SIZE, ph = PIECE_SIZE;
            const fullW = cols * pw, fullH = rows * ph;
            const master = buildFlagCanvas(current, fullW, fullH);

            const grid = document.getElementById('drop-grid');
            grid.style.gridTemplateColumns = `repeat(${cols}, ${pw}px)`;
            grid.style.gridTemplateRows    = `repeat(${rows}, ${ph}px)`;
            grid.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'drop-cell';
                    cell.style.width  = pw + 'px';
                    cell.style.height = ph + 'px';
                    cell.dataset.r = r; cell.dataset.c = c;
                    cell.addEventListener('dragover',  e => { e.preventDefault(); cell.classList.add('over'); });
                    cell.addEventListener('dragleave', () => cell.classList.remove('over'));
                    cell.addEventListener('drop', e => {
                        e.preventDefault(); cell.classList.remove('over');
                        const id    = e.dataTransfer.getData('pieceId');
                        const piece = pieces.find(p => p.id === id);
                        if (!piece || cell.dataset.filled) return;
                        const img = document.createElement('canvas');
                        img.width = pw; img.height = ph;
                        img.getContext('2d').drawImage(master, piece.col*pw, piece.row*ph, pw, ph, 0, 0, pw, ph);
                        img.style.borderRadius = '4px';
                        cell.innerHTML = ''; cell.appendChild(img);
                        cell.dataset.filled = '1';
                        cell.classList.add('filled');
                        placed[id] = true;
                        const orig = document.getElementById('piece-' + id);
                        if (orig) orig.classList.add('used');
                        checkAllPlaced();
                    });
                    grid.appendChild(cell);
                }
            }

            const tray = document.getElementById('pieces-tray');
            tray.innerHTML = '';
            const allPieces = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    allPieces.push({ id: `${r}-${c}`, row: r, col: c });
                }
            }
            for (let i = allPieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allPieces[i], allPieces[j]] = [allPieces[j], allPieces[i]];
            }
            pieces = allPieces;

            allPieces.forEach(p => {
                const pc = document.createElement('canvas');
                pc.width = pw; pc.height = ph;
                pc.getContext('2d').drawImage(master, p.col*pw, p.row*ph, pw, ph, 0, 0, pw, ph);
                pc.className  = 'piece';
                pc.id         = 'piece-' + p.id;
                pc.draggable  = true;
                pc.addEventListener('dragstart', e => { e.dataTransfer.setData('pieceId', p.id); });
                tray.appendChild(pc);
            });
        }

        function checkAllPlaced() {
            const total = current.cols * current.rows;
            if (Object.keys(placed).length === total) {
                document.getElementById('hint-text').textContent =
                    'All pieces placed! Now guess the ' + (mode === 'flag' ? 'flag' : 'country') + '!';
            }
        }

        function checkAnswer() {
            const val     = document.getElementById('answer-input').value.trim().toLowerCase();
            if (!val) return;
            const correct = current.country.toLowerCase();
            const isRight = val === correct;
            const points  = Math.max(1, 3 - hintCount);
            if (isRight) {
                score += points; streak++;
                history.push(true);
                document.getElementById('result-msg').innerHTML =
                    `<div class="result win">Correct! It was ${current.country}! +${points} points</div>`;
            } else {
                streak = 0;
                history.push(false);
                document.getElementById('result-msg').innerHTML =
                    `<div class="result lose">Not quite! The answer was ${current.country}.</div>`;
            }
            document.getElementById('score').textContent  = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('answer-input').disabled = true;
            renderProgress();
        }

        function giveHint() {
            hintCount++;
            const hints = [
                `Continent: ${current.continent}`,
                `First letter: ${current.country[0]}`,
                `It has ${current.country.length} letters`,
            ];
            document.getElementById('hint-text').textContent =
                'Hint: ' + hints[Math.min(hintCount - 1, hints.length - 1)];
        }

        document.getElementById('answer-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnswer();
        });

        mode = 'flag';
        newRound();
    </script>

</body>
</html>
